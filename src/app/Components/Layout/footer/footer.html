<footer class="main-footer container-fluid">
    <div class="row footer-content py-5">

        <!--Formulario para suscribirse a un newsletter.-->
        <div class="col-12 col-md-4 newsletter">
            <h3 class="texto-footer">Suscribete a nuestro catalogo</h3>
            <p>Recibe las mejores ofertas todos los meses en tu correo electronico.</p>
            <form class="subscribe-form" id="subscribeForm" (submit)="onSubmit($event)">
                <label for="footerEmail" class="sr-only">Rellena tu correo electrónico</label>
                <input type="email" id="footerEmail" placeholder="Tu correo electrónico" 
                       [(ngModel)]="email" name="email" (input)="onEmailInput()" [ngStyle]="inputStyle" required>
                <button type="submit" class="btn-submit" id="btnSubscribe" [disabled]="isBtnDisabled">Suscribir</button>
            </form>
            <span id="emailFeedback" class="email-feedback" [style.color]="feedbackColor">{{ feedbackMessage }}</span>
            <div id="subscribeSuccess" class="subscribe-success" *ngIf="isSubscribed">
                ✅ ¡Te has suscrito exitosamente!
            </div>
        </div>


        <!--Mapa interactivo-->
        <div class="col-12 col-md-4 map-container">
            <h3 class="texto-footer">Sede Central</h3>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13136.066870028212!2d-58.3815704!3d-34.6037389!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4aa9f0a6da5edb%3A0x11be22f1ce14c457!2sObelisco!5e0!3m2!1ses!2sar!4v1684343123456!5m2!1ses!2sar"
                width="100%" height="200" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
                title="Mapa interactivo de la oficina central en Buenos Aires"></iframe>
        </div>
    </div>

    <!--Mapa interactivo-->
    <div class="footer-bottom">
        <p>&copy; Escuela de Minas Dr. Horacio Carrillo. Todos los derechos reservados.</p>
    </div>
</footer>
