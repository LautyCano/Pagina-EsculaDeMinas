<!-- Modal Login -->
<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg p-4 border-0 rounded-4 bg-dark text-white" style="max-width: 450px; width: 100%;">
    
    <div class="card-body text-center">
      <h2 class="fw-bold mb-4 text-primary">Iniciar Sesión</h2>
      <p class="text-muted small mb-4">Ingrese sus credenciales para acceder al sistema administrador.</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <div class="mb-3 text-start">
          <label for="nombre" class="form-label fw-medium small">Nombre de Usuario:</label>
          <input type="text" id="nombre" formControlName="nombre" class="form-control bg-secondary text-white border-0 py-2" placeholder="Ej: Lautaro"
            required>
        </div>
        
        <div class="mb-4 text-start">
          <label for="contra" class="form-label fw-medium small">Contraseña:</label>
          <input type="password" id="contra" formControlName="contra" class="form-control bg-secondary text-white border-0 py-2" placeholder="••••••••" required>
        </div>
        
        @if (loginForm.errors) {
          <div class="alert alert-danger small p-2 text-start mb-3 border-0">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ loginForm.errors['errorMessage'] }}
          </div>
        }

        <div class="d-grid gap-2 d-sm-flex justify-content-sm-end mt-4">
          <button type="button" routerLink="/home" class="btn btn-outline-light btn-sm px-3 rounded-pill">Cancelar</button>
          <button type="submit" class="btn btn-primary btn-sm px-4 rounded-pill fw-semibold">Verificar Usuario</button>
        </div>
      </form>
    </div>
  </div>
</div>
