<div class="container my-5"> <!--Contenedor principal-->
    <div class="row justify-content-center"> <!--Centra las columnas-->
        <div class="col-12 col-md-10 col-lg-8"> <!--Columna de ancho variable-->
            
            <div class="card card-custom"> <!--Tarjeta con borde redondeado-->
                <form [formGroup]="noticiaForm" (ngSubmit)="onSubmit()">
                <div class="card-header card-header-custom text-center py-4">
                    <h3 class="mb-0" *ngIf="esEdicion">Editar Publicacion</h3> <!--Título del formulario-->
                    <h3 class="mb-0" *ngIf="!esEdicion">Creacion de la Publicacion</h3> <!--Título del formulario-->
                </div>

                <div class="card-body p-4">
                    <!--Formulario-->
                        <div class="row g-3"> <!--Filas y columnas-->
                            <div class="col-12" *ngIf="esDistincion == true"><!-- ngIf: Es como un if donde pregunta si categoriaAlumno tienen algo cargado. Si es asi muestra ciertos parametros-->
                                <div class="col-12">
                                    <label for="titulo" class="form-label">Titulo</label>
                                    <input type="text" class="form-control" id="titulo" name="titulo" required formControlName="titulo" />
                                </div>
                                
                                <div class="col-md-6">
                                    <label for="imagen" class="form-label">Imagen</label>
                                    <input type="file" class="form-control" id="imagen" name="imagen"  formControlName="imagen" />
                                </div>

                                <div class="col-md-12">
                                    <label for="descripcion" class="form-label">Descripcion</label>
                                    <textarea class="form-control" id="descripcion" name="descripcion" rows="5" required formControlName="descripcion"></textarea>
                                </div>
                            </div>

                            <div class="col-12" *ngIf="esDistincion == false">
                                 <div class="col-md-12">
                                    <label for="titulo" class="form-label">Titulo</label>
                                    <input type="text" class="form-control" id="titulo" name="titulo" required formControlName="titulo" />
                                </div>

                                <div class="col-6"> 
                                    <label for="imagen" class="form-label">Imagen</label>
                                    <input type="file" class="form-control" id="imagen" name="imagen" required formControlName="imagen" />
                                </div>

                                <div class="col-12">
                                    <label for="descripcion" class="form-label">Descripcion</label>
                                    <textarea class="form-control" id="descripcion" name="descripcion" rows="5" required formControlName="descripcion"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <button type="button" class="btn btn-secondary" (click)="limpiarFormulario()">Limpiar</button>
                            <button type="submit" class="btn btn-primary" id="btn-enviar" *ngIf="esEdicion">Editar</button>
                            <button type="submit" class="btn btn-primary" id="btn-enviar" *ngIf="!esEdicion">Publicar</button>
                        </div>
                    </div>
                </form>
            </div>
            
        </div>
    </div>
</div>
